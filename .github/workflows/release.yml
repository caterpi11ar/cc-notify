name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --draft \
            --title "${{ github.ref_name }}" \
            --generate-notes

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rust-target: aarch64-apple-darwin
            cli-binary: cc-notify
            cli-artifact: cc-notify-cli-aarch64-apple-darwin
            desktop-glob: "src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg"
          - os: macos-latest
            rust-target: x86_64-apple-darwin
            cli-binary: cc-notify
            cli-artifact: cc-notify-cli-x86_64-apple-darwin
            desktop-glob: "src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg"
          - os: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            cli-binary: cc-notify
            cli-artifact: cc-notify-cli-x86_64-unknown-linux-gnu
            desktop-glob: "src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb"
          - os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            cli-binary: cc-notify.exe
            cli-artifact: cc-notify-cli-x86_64-pc-windows-msvc.exe
            desktop-glob: "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
            cc-notify-cli -> target

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm tauri build --target ${{ matrix.rust-target }}

      - name: Build CLI
        run: cargo build --manifest-path cc-notify-cli/Cargo.toml --release --target ${{ matrix.rust-target }}

      - name: Upload artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          cp "cc-notify-cli/target/${{ matrix.rust-target }}/release/${{ matrix.cli-binary }}" "${{ matrix.cli-artifact }}"
          gh release upload "${{ github.ref_name }}" ${{ matrix.desktop-glob }} "${{ matrix.cli-artifact }}"

  publish-release:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${{ github.ref_name }}" --draft=false
